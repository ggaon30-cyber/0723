<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg: #fdf6ec;
    --card: #ffffff;
    --accent: #ff8a5c;
    --danger: #e74c3c;
    --text: #3a2f2f;
  }
  * { box-sizing: border-box; }
  body, html {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    background: var(--bg);
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 0 24px 0;
  }
  #scoreboard {
    display: flex;
    gap: 24px;
    margin-bottom: 10px;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }
  #scoreboard span.label {
    font-weight: 400;
    font-size: 13px;
    color: #888;
    display: block;
  }
  #stage {
    position: relative;
    width: 320px;
    height: 380px;
    background: linear-gradient(180deg, #ffe9d6 0%, #ffd9b8 100%);
    border-radius: 20px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #cat {
    width: 220px;
    height: 220px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: transform 0.08s ease;
    touch-action: manipulation;
  }
  #cat:active { transform: scale(0.95); }

  #warning-banner {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--danger);
    color: white;
    font-weight: 700;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 999px;
    opacity: 0;
    transition: opacity 0.15s ease;
    pointer-events: none;
  }
  #warning-banner.show { opacity: 1; }

  #floaters { position: absolute; inset: 0; pointer-events: none; }
  .floater {
    position: absolute;
    font-weight: 800;
    font-size: 20px;
    color: var(--accent);
    animation: floatUp 0.7s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-40px); }
  }

  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(20, 10, 10, 0.75);
    color: white;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
  }
  #overlay.show { display: flex; }
  #overlay h2 {
    margin: 0 0 6px 0;
    font-size: 26px;
  }
  #overlay p {
    margin: 4px 0;
    font-size: 15px;
    opacity: 0.9;
  }
  #overlay .best-tag {
    color: #ffd76b;
    font-weight: 700;
  }
  #restart-btn {
    margin-top: 16px;
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 22px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  #restart-btn:active { transform: scale(0.96); }

  #start-overlay {
    position: absolute;
    inset: 0;
    background: rgba(20, 10, 10, 0.55);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
  }
  #start-overlay button {
    margin-top: 14px;
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 22px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }

  #hint {
    margin-top: 10px;
    font-size: 13px;
    color: #a08b7a;
    text-align: center;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="scoreboard">
    <div>
      <span class="label">현재 점수</span>
      <span id="score">0</span>
    </div>
    <div>
      <span class="label">최고 기록</span>
      <span id="best">0</span>
    </div>
  </div>

  <div id="stage">
    <div id="warning-banner">위험! 앞을 보고 있어요</div>
    <svg id="cat" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="floaters"></div>

    <div id="overlay">
      <h2>😿 게임 오버!</h2>
      <p>이번 점수: <span id="final-score">0</span></p>
      <p class="best-tag">최고 기록: <span id="final-best">0</span></p>
      <button id="restart-btn">다시 시작</button>
    </div>

    <div id="start-overlay">
      <h2 style="margin:0 0 6px 0;">🐱 고양이 쓰다듬기</h2>
      <p style="font-size:13px; opacity:0.9; margin:0;">뒤돌아 있을 때만 살짝!<br>완전히 돌아보면 게임 오버예요.</p>
      <button id="start-btn">게임 시작</button>
    </div>
  </div>

  <div id="hint">뒤돌아 있을 때 클릭 → 점수 획득 · 앞을 볼 때 클릭 → 게임 오버</div>
</div>

<script>
(function() {
  // ---------- 상태 정의 ----------
  const STATE_BACK = "back";       // 완전히 뒤돌아 있음 (안전)
  const STATE_SIDE = "side";       // 살짝 옆을 봄 (안전, 전조 단계)
  const STATE_FRONT = "front";     // 완전히 앞을 봄 (위험, 화난 상태)

  const SIDE_DURATION_START = 800;  // ms, 0.8초
  const SIDE_DURATION_MIN = 280;    // ms, 최소치 (너무 빨라져서 불가능해지지 않도록)
  const SIDE_DURATION_STEP = 25;    // 점수 1점당 줄어드는 시간(ms)
  const FRONT_DURATION = 1000;      // ms, 1초 고정

  // 다음 "뒤돌아보기 이벤트"가 발생하기까지 대기하는 시간 범위
  const NEXT_EVENT_MIN = 1200;
  const NEXT_EVENT_MAX = 2600;

  let score = 0;
  let best = 0;
  let currentState = STATE_BACK;
  let gameRunning = false;
  let timers = [];

  const scoreEl = document.getElementById("score");
  const bestEl = document.getElementById("best");
  const catEl = document.getElementById("cat");
  const stageEl = document.getElementById("stage");
  const warningEl = document.getElementById("warning-banner");
  const overlayEl = document.getElementById("overlay");
  const finalScoreEl = document.getElementById("final-score");
  const finalBestEl = document.getElementById("final-best");
  const restartBtn = document.getElementById("restart-btn");
  const startOverlay = document.getElementById("start-overlay");
  const startBtn = document.getElementById("start-btn");
  const floatersEl = document.getElementById("floaters");

  // localStorage에서 최고 기록 불러오기
  try {
    const saved = localStorage.getItem("cat_game_best_score");
    if (saved) best = parseInt(saved, 10) || 0;
  } catch (e) {}
  bestEl.textContent = best;

  function saveBest() {
    try { localStorage.setItem("cat_game_best_score", String(best)); } catch (e) {}
  }

  function clearTimers() {
    timers.forEach(t => clearTimeout(t));
    timers = [];
  }

  function addTimer(fn, ms) {
    const id = setTimeout(fn, ms);
    timers.push(id);
    return id;
  }

  // ---------- 고양이 SVG 그리기 ----------
  // 뒤통수(back), 살짝 옆(side), 화난 정면(front) 세 가지 얼굴을 그린다.
  function renderCat(state) {
    let svg = "";
    if (state === STATE_BACK) {
      // 뒤통수: 귀 + 뒤통수 실루엣만
      svg = `
        <ellipse cx="100" cy="115" rx="70" ry="65" fill="#c98a5b"/>
        <polygon points="45,70 25,20 75,55" fill="#c98a5b"/>
        <polygon points="155,70 175,20 125,55" fill="#c98a5b"/>
        <polygon points="45,68 33,35 68,58" fill="#8a5a36"/>
        <polygon points="155,68 167,35 132,58" fill="#8a5a36"/>
        <path d="M100 60 Q95 110 100 170" stroke="#8a5a36" stroke-width="3" fill="none" opacity="0.5"/>
        <path d="M70 90 Q100 100 130 90" stroke="#8a5a36" stroke-width="2" fill="none" opacity="0.4"/>
      `;
    } else if (state === STATE_SIDE) {
      // 살짝 옆을 돌아본 모습 (얼굴 일부 + 눈 하나만 살짝 보임)
      svg = `
        <ellipse cx="105" cy="115" rx="70" ry="65" fill="#c98a5b"/>
        <polygon points="50,70 30,20 80,55" fill="#c98a5b"/>
        <polygon points="160,70 180,20 130,55" fill="#c98a5b"/>
        <polygon points="50,68 38,35 73,58" fill="#8a5a36"/>
        <polygon points="160,68 172,35 137,58" fill="#8a5a36"/>
        <ellipse cx="150" cy="118" rx="14" ry="16" fill="#fff3e6"/>
        <circle cx="153" cy="118" r="5" fill="#2e2e2e"/>
        <path d="M140 140 Q150 145 158 140" stroke="#8a5a36" stroke-width="2" fill="none"/>
      `;
    } else if (state === STATE_FRONT) {
      // 완전히 앞을 본 화난 얼굴
      svg = `
        <ellipse cx="100" cy="115" rx="72" ry="66" fill="#c98a5b"/>
        <polygon points="40,65 20,15 75,55" fill="#c98a5b"/>
        <polygon points="160,65 180,15 125,55" fill="#c98a5b"/>
        <polygon points="40,63 28,32 68,58" fill="#8a5a36"/>
        <polygon points="160,63 172,32 132,58" fill="#8a5a36"/>
        <ellipse cx="72" cy="120" rx="16" ry="18" fill="#fff3e6"/>
        <ellipse cx="128" cy="120" rx="16" ry="18" fill="#fff3e6"/>
        <path d="M60 112 L84 122" stroke="#2e2e2e" stroke-width="3"/>
        <path d="M140 112 L116 122" stroke="#2e2e2e" stroke-width="3"/>
        <circle cx="76" cy="122" r="6" fill="#2e2e2e"/>
        <circle cx="124" cy="122" r="6" fill="#2e2e2e"/>
        <path d="M55 95 L40 78 M65 88 L55 68 M145 95 L160 78 M135 88 L145 68" stroke="#8a5a36" stroke-width="2"/>
        <polygon points="100,138 90,150 110,150" fill="#e88a8a"/>
        <path d="M100 150 Q100 158 92 160 M100 150 Q100 158 108 160" stroke="#2e2e2e" stroke-width="2" fill="none"/>
        <path d="M75 165 Q100 150 125 165" stroke="#2e2e2e" stroke-width="2.5" fill="none"/>
        <line x1="45" y1="130" x2="15" y2="122" stroke="#2e2e2e" stroke-width="1.5"/>
        <line x1="45" y1="138" x2="14" y2="138" stroke="#2e2e2e" stroke-width="1.5"/>
        <line x1="155" y1="130" x2="185" y2="122" stroke="#2e2e2e" stroke-width="1.5"/>
        <line x1="155" y1="138" x2="186" y2="138" stroke="#2e2e2e" stroke-width="1.5"/>
      `;
    }
    catEl.innerHTML = svg;
  }

  function setState(state) {
    currentState = state;
    renderCat(state);
    if (state === STATE_FRONT) {
      warningEl.classList.add("show");
    } else {
      warningEl.classList.remove("show");
    }
  }

  // ---------- 점수 획득 이펙트 ----------
  function showFloater(text, color) {
    const el = document.createElement("div");
    el.className = "floater";
    el.textContent = text;
    el.style.left = (40 + Math.random() * 140) + "px";
    el.style.top = (140 + Math.random() * 40) + "px";
    if (color) el.style.color = color;
    floatersEl.appendChild(el);
    setTimeout(() => el.remove(), 700);
  }

  // ---------- 고양이가 뒤돌아보는 이벤트 시퀀스 ----------
  function currentSideDuration() {
    const d = SIDE_DURATION_START - score * SIDE_DURATION_STEP;
    return Math.max(SIDE_DURATION_MIN, d);
  }

  function scheduleNextTurnEvent() {
    if (!gameRunning) return;
    const wait = NEXT_EVENT_MIN + Math.random() * (NEXT_EVENT_MAX - NEXT_EVENT_MIN);
    addTimer(runTurnSequence, wait);
  }

  function runTurnSequence() {
    if (!gameRunning) return;
    // 1) 살짝 옆
    setState(STATE_SIDE);
    const sideDur = currentSideDuration();
    addTimer(() => {
      if (!gameRunning) return;
      // 2) 완전히 앞 (화난 상태)
      setState(STATE_FRONT);
      addTimer(() => {
        if (!gameRunning) return;
        // 3) 다시 원래 뒤돌아 상태
        setState(STATE_BACK);
        scheduleNextTurnEvent();
      }, FRONT_DURATION);
    }, sideDur);
  }

  // ---------- 클릭(터치) 처리 ----------
  function handlePet(e) {
    e.preventDefault();
    if (!gameRunning) return;

    if (currentState === STATE_FRONT) {
      endGame();
      return;
    }
    // back 또는 side 상태 -> 안전, 점수 획득
    score += 1;
    scoreEl.textContent = score;
    showFloater("+1");
  }

  catEl.addEventListener("click", handlePet);
  catEl.addEventListener("touchstart", handlePet, { passive: false });

  // ---------- 게임 오버 / 시작 / 재시작 ----------
  function endGame() {
    gameRunning = false;
    clearTimers();
    setState(STATE_FRONT);
    if (score > best) {
      best = score;
      saveBest();
    }
    bestEl.textContent = best;
    finalScoreEl.textContent = score;
    finalBestEl.textContent = best;
    overlayEl.classList.add("show");
  }

  function startGame() {
    score = 0;
    scoreEl.textContent = 0;
    overlayEl.classList.remove("show");
    startOverlay.style.display = "none";
    gameRunning = true;
    setState(STATE_BACK);
    scheduleNextTurnEvent();
  }

  restartBtn.addEventListener("click", startGame);
  startBtn.addEventListener("click", startGame);

  // 초기 렌더 (시작 전 뒤돌아 있는 고양이 미리 보여주기)
  renderCat(STATE_BACK);
})();
</script>
</body>
</html>
